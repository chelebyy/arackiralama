services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    networks:
      - dokploy-network

  redis:
    image: redis:7.4
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - dokploy-network

  api-upload-permissions:
    image: mcr.microsoft.com/dotnet/aspnet:10.0
    restart: "no"
    command: sh -c "mkdir -p /uploads/vehicles && chown -R 10000:10000 /uploads"
    volumes:
      - api_uploads:/uploads
    networks:
      - dokploy-network

  api:
    build:
      context: ./backend
      dockerfile: src/RentACar.API/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-upload-permissions:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      AllowedHosts: ${ALLOWED_HOSTS:-localhost;127.0.0.1;[::1];api}
      ConnectionStrings__DefaultConnection: ${DATABASE_URL}
      Redis__ConnectionString: ${REDIS_CONNECTION_STRING}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__Secret: ${JWT_SECRET}
      Database__AutoMigrateOnStartup: ${DATABASE_AUTO_MIGRATE_ON_STARTUP:-true}
      Cors__AllowedOrigins__0: ${NEXT_PUBLIC_APP_URL}
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - api_uploads:/app/wwwroot/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - dokploy-network

  demo-admin-seed:
    image: postgres:17
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      DEMO_ADMIN_SEED_PASSWORD_HASH: ${DEMO_ADMIN_SEED_PASSWORD_HASH:-}
    command:
      - sh
      - -c
      - |
        test -n "$$DEMO_ADMIN_SEED_PASSWORD_HASH" || exit 0
        escaped_hash=$$(printf '%s' "$$DEMO_ADMIN_SEED_PASSWORD_HASH" | sed "s/'/''/g")
        psql -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -v ON_ERROR_STOP=1 \
          -c "insert into admin_users (id, created_at, updated_at, email, normalized_email, password_hash, full_name, role, is_active, failed_login_count, lockout_end_utc, last_login_at_utc, token_version) values ('cccccccc-cccc-cccc-cccc-ccccccccccc1', now(), now(), 'integration-admin@rentacar.test', 'INTEGRATION-ADMIN@RENTACAR.TEST', '$$escaped_hash', 'Integration Test Admin', 'SuperAdmin', true, 0, null, null, 0) on conflict (normalized_email) do update set updated_at = now(), password_hash = excluded.password_hash, full_name = excluded.full_name, role = 'SuperAdmin', is_active = true, failed_login_count = 0, lockout_end_utc = null, token_version = admin_users.token_version + 1;"
    networks:
      - dokploy-network

  worker:
    build:
      context: ./backend
      dockerfile: src/RentACar.Worker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
      demo-admin-seed:
        condition: service_completed_successfully
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${DATABASE_URL}
      Redis__ConnectionString: ${REDIS_CONNECTION_STRING}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__Secret: ${JWT_SECRET}
      Database__AutoMigrateOnStartup: "false"
    healthcheck:
      test: ["CMD-SHELL", "grep -qa 'RentACar.Worker.dll' /proc/1/cmdline || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dokploy-network

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_ADMIN_API_URL: ${NEXT_PUBLIC_ADMIN_API_URL:-/api/admin}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      demo-admin-seed:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_ADMIN_API_URL: ${NEXT_PUBLIC_ADMIN_API_URL:-/api/admin}
      AUTH_BACKEND_URL: ${AUTH_BACKEND_URL}
      AUTH_ACCESS_COOKIE_NAME: ${AUTH_ACCESS_COOKIE_NAME:-rac_access}
      AUTH_REFRESH_COOKIE_NAME: ${AUTH_REFRESH_COOKIE_NAME:-__Host-rac_refresh}
      GA_KEY: ${GA_KEY:-}
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - dokploy-network

volumes:
  postgres_data:
  redis_data:
  api_uploads:

networks:
  dokploy-network:
    external: true
    name: ${DOKPLOY_NETWORK:-dokploy-network}
