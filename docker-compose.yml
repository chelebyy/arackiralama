services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    networks:
      - dokploy-network

  redis:
    image: redis:7.4
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - dokploy-network

  api-upload-permissions:
    image: mcr.microsoft.com/dotnet/aspnet:10.0
    restart: "no"
    command: sh -c "mkdir -p /uploads/vehicles && chown -R 10000:10000 /uploads"
    volumes:
      - api_uploads:/uploads
    networks:
      - dokploy-network

  api:
    build:
      context: ./backend
      dockerfile: src/RentACar.API/Dockerfile
      args:
        DEPLOY_CACHE_BUST: ${DEPLOY_CACHE_BUST:-1}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-upload-permissions:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      AllowedHosts: ${ALLOWED_HOSTS:-localhost;127.0.0.1;[::1];api}
      ConnectionStrings__DefaultConnection: ${DATABASE_URL}
      Redis__ConnectionString: ${REDIS_CONNECTION_STRING}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__Secret: ${JWT_SECRET}
      LocalAdminSeed__Enabled: ${LOCAL_ADMIN_SEED_ENABLED:-false}
      LocalAdminSeed__Password: ${LOCAL_ADMIN_SEED_PASSWORD:-}
      LocalAdminSeed__AllowOutsideDevelopment: ${LOCAL_ADMIN_SEED_ALLOW_OUTSIDE_DEVELOPMENT:-false}
      Database__AutoMigrateOnStartup: ${DATABASE_AUTO_MIGRATE_ON_STARTUP:-true}
      Cors__AllowedOrigins__0: ${NEXT_PUBLIC_APP_URL}
      Notifications__PublicFrontendBaseUrl: ${NOTIFICATIONS_PUBLIC_FRONTEND_BASE_URL}
      Payment__Provider: ${PAYMENT_PROVIDER:-Disabled}
      Payment__Currency: ${PAYMENT_CURRENCY:-TRY}
      Payment__EnablePayments: ${PAYMENT_ENABLE_PAYMENTS:-false}
      Payment__Iyzico__ApiKey: ${PAYMENT_IYZICO_API_KEY:-}
      Payment__Iyzico__SecretKey: ${PAYMENT_IYZICO_SECRET_KEY:-}
      Payment__Iyzico__BaseUrl: ${PAYMENT_IYZICO_BASE_URL:-}
      Payment__Iyzico__WebhookSecret: ${PAYMENT_IYZICO_WEBHOOK_SECRET:-}
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - api_uploads:/app/wwwroot/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - dokploy-network

  worker:
    build:
      context: ./backend
      dockerfile: src/RentACar.Worker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${DATABASE_URL}
      Redis__ConnectionString: ${REDIS_CONNECTION_STRING}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__Secret: ${JWT_SECRET}
      Database__AutoMigrateOnStartup: "false"
    healthcheck:
      test: ["CMD-SHELL", "grep -qa 'RentACar.Worker.dll' /proc/1/cmdline || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dokploy-network

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_ADMIN_API_URL: ${NEXT_PUBLIC_ADMIN_API_URL:-/api/admin}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_ADMIN_API_URL: ${NEXT_PUBLIC_ADMIN_API_URL:-/api/admin}
      AUTH_BACKEND_URL: ${AUTH_BACKEND_URL}
      AUTH_ACCESS_COOKIE_NAME: ${AUTH_ACCESS_COOKIE_NAME:-rac_access}
      AUTH_REFRESH_COOKIE_NAME: ${AUTH_REFRESH_COOKIE_NAME:-__Host-rac_refresh}
      GA_KEY: ${GA_KEY:-}
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - dokploy-network

volumes:
  postgres_data:
  redis_data:
  api_uploads:

networks:
  dokploy-network:
    external: true
    name: ${DOKPLOY_NETWORK:-dokploy-network}
