services:
  postgres:
    image: postgres:18
    container_name: rentacar-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rentacar
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rentacar"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    container_name: rentacar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/RentACar.API/Dockerfile
    container_name: rentacar-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=rentacar;Username=postgres;Password=postgres
      Redis__ConnectionString: redis:6379
      Jwt__Secret: local-dev-only-jwt-secret-change-me-12345
    ports:
      - "5000:8080"

  worker:
    build:
      context: .
      dockerfile: src/RentACar.Worker/Dockerfile
    container_name: rentacar-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=rentacar;Username=postgres;Password=postgres
      Redis__ConnectionString: redis:6379

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: rentacar-web
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:8080
      NEXT_PUBLIC_API_BASE_URL: http://api:8080
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      AUTH_BACKEND_URL: http://api:8080
    ports:
      - "3001:3000"

volumes:
  postgres_data:
  redis_data:
