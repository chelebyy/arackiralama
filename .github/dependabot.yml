version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/frontend'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Istanbul'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'frontend'
    commit-message:
      prefix: 'deps(frontend)'
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      nextjs:
        patterns:
          - 'next'
          - '@next/*'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'

  - package-ecosystem: 'nuget'
    directory: '/backend'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Istanbul'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'backend'
    commit-message:
      prefix: 'deps(backend)'
    groups:
      dotnet:
        patterns:
          - 'Microsoft.*'
          - 'System.*'
      data-access:
        patterns:
          - 'Npgsql*'
          - 'BCrypt.Net-Next'

  - package-ecosystem: 'docker'
    directory: '/backend/src/RentACar.API'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Istanbul'
    open-pull-requests-limit: 2
    labels:
      - 'dependencies'
      - 'docker'
    commit-message:
      prefix: 'deps(docker-api)'

  - package-ecosystem: 'docker'
    directory: '/backend/src/RentACar.Worker'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Istanbul'
    open-pull-requests-limit: 2
    labels:
      - 'dependencies'
      - 'docker'
    commit-message:
      prefix: 'deps(docker-worker)'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Istanbul'
    open-pull-requests-limit: 3
    labels:
      - 'dependencies'
      - 'ci-cd'
    commit-message:
      prefix: 'ci'
