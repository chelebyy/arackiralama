version: 2
updates:
  # Frontend dependencies (npm/pnpm)
  - package-ecosystem: 'npm'
    directory: '/frontend'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Istanbul'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'frontend'
    commit-message:
      prefix: 'deps(frontend)'
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      nextjs:
        patterns:
          - 'next'
          - '@next/*'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'

  # Backend dependencies (NuGet)
  - package-ecosystem: 'nuget'
    directory: '/backend'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Istanbul'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'backend'
    commit-message:
      prefix: 'deps(backend)'
    groups:
      dotnet-aspire:
        patterns:
          - 'Aspire*'
          - 'Microsoft.Extensions.ServiceDiscovery*'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Istanbul'
    open-pull-requests-limit: 3
    labels:
      - 'dependencies'
      - 'ci-cd'
    commit-message:
      prefix: 'ci'
