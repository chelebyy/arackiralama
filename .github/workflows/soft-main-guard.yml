name: Soft Main Guard

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read
  issues: write

jobs:
  detect-unauthorized:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      unauthorized: ${{ steps.scan.outputs.unauthorized }}
      commit_list: ${{ steps.scan.outputs.commit_list }}
    steps:
      - name: Scan pushed commits for merged PR association
        id: scan
        uses: actions/github-script@v7
        with:
          script: |
            const commits = context.payload.commits || [];
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const unauthorized = [];

            for (const commit of commits) {
              const message = commit.message || "";
              if (message.includes("[main-guard:allow]")) {
                core.info(`Allowed by override token: ${commit.id}`);
                continue;
              }

              const result = await github.graphql(
                `
                query ($owner: String!, $repo: String!, $oid: GitObjectID!) {
                  repository(owner: $owner, name: $repo) {
                    object(oid: $oid) {
                      ... on Commit {
                        associatedPullRequests(first: 10) {
                          nodes {
                            number
                            merged
                          }
                        }
                      }
                    }
                  }
                }
                `,
                { owner, repo, oid: commit.id }
              );

              const prs = result.repository.object?.associatedPullRequests?.nodes || [];
              const hasMergedPr = prs.some((pr) => pr.merged);

              if (!hasMergedPr) {
                unauthorized.push(commit.id);
              }
            }

            core.setOutput("unauthorized", unauthorized.length > 0 ? "true" : "false");
            core.setOutput("commit_list", unauthorized.join(" "));
            core.info(`Scanned ${commits.length} commit(s), unauthorized: ${unauthorized.length}`);

  revert-unauthorized:
    needs: detect-unauthorized
    if: needs.detect-unauthorized.outputs.unauthorized == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Revert unauthorized commits
        env:
          COMMIT_LIST: ${{ needs.detect-unauthorized.outputs.commit_list }}
        shell: bash
        run: |
          set -euo pipefail
          IFS=' ' read -r -a commits <<< "$COMMIT_LIST"

          if [[ ${#commits[@]} -eq 0 ]]; then
            echo "No unauthorized commits found."
            exit 0
          fi

          for (( idx=${#commits[@]}-1; idx>=0; idx-- )); do
            commit="${commits[$idx]}"
            parent_count=$(git show -s --format=%P "$commit" | wc -w | tr -d ' ')

            if [[ "$parent_count" -gt 1 ]]; then
              git revert --no-edit -m 1 "$commit"
            else
              git revert --no-edit "$commit"
            fi
          done

      - name: Push revert commit(s)
        run: git push origin main

      - name: Open incident issue
        uses: actions/github-script@v7
        with:
          script: |
            const commits = `${{ needs.detect-unauthorized.outputs.commit_list }}`.trim();
            const body = [
              "Direct push to `main` was detected and automatically reverted.",
              "",
              `- Actor: @${context.actor}`,
              `- SHA: ${context.sha}`,
              `- Unauthorized commits: ${commits || "n/a"}`,
              "",
              "If this push was intentional, re-apply via PR or include `[main-guard:allow]` in commit message for an emergency override."
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Auto-reverted direct push on main (${context.sha.slice(0, 7)})`,
              body
            });
