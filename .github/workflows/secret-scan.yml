name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Scan repository and history
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo:ro" \
            -v "$RUNNER_TEMP:/reports" \
            zricethezav/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            --gitleaks-ignore-path=/repo/.gitleaksignore \
            detect --source=/repo --no-banner --no-color --redact=100 --log-level error \
              --report-format json --report-path /reports/gitleaks-raw.json
      - name: Sanitize report
        if: always()
        run: |
          if [ ! -f "$RUNNER_TEMP/gitleaks-raw.json" ]; then
            printf '[]\n' > "$RUNNER_TEMP/gitleaks-report.json"
            exit 0
          fi
          jq '[.[] | {
            ruleId: .RuleID,
            file: .File,
            startLine: .StartLine,
            endLine: .EndLine,
            commit: .Commit,
            fingerprint: .Fingerprint
          }]' "$RUNNER_TEMP/gitleaks-raw.json" > "$RUNNER_TEMP/gitleaks-report.json"
          rm "$RUNNER_TEMP/gitleaks-raw.json"
      - name: Upload sanitized report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: ${{ runner.temp }}/gitleaks-report.json
          if-no-files-found: ignore
          retention-days: 7
