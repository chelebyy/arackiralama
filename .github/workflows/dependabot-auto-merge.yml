name: Dependabot Auto Merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-approve-and-enable-merge:
    name: Approve and Enable Auto-Merge
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    concurrency:
      group: dependabot-auto-merge-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip major version updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          echo "Skipping auto-merge for major version update. Manual review required."

      - name: Approve PR if needed
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          review_decision=$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json reviewDecision --jq '.reviewDecision // ""')
          if [[ "$review_decision" == "APPROVED" ]]; then
            echo "Pull request is already approved."
            exit 0
          fi
          gh pr review "$PR_NUMBER" --repo "$REPOSITORY" --approve --body "Auto-approved for safe Dependabot update (${{ steps.metadata.outputs.update-type }})."

      - name: Enable auto-merge if needed
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          auto_merge_enabled=$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json autoMergeRequest --jq '.autoMergeRequest != null')
          if [[ "$auto_merge_enabled" == "true" ]]; then
            echo "Auto-merge is already enabled."
            exit 0
          fi
          gh pr merge "$PR_NUMBER" --repo "$REPOSITORY" --auto --squash
