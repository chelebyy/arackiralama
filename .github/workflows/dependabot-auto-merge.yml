name: Dependabot Auto Merge (Bot Only)

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-enable-merge:
    name: Dependabot Auto-Merge Decision
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    concurrency:
      group: dependabot-auto-merge-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide merge policy
        id: policy
        shell: bash
        run: |
          set -euo pipefail
          update_type="${{ steps.metadata.outputs.update-type }}"
          case "$update_type" in
            version-update:semver-patch|version-update:semver-minor)
              echo "auto_merge=true" >> "$GITHUB_OUTPUT"
              echo "reason=patch-or-minor" >> "$GITHUB_OUTPUT"
              echo "Auto-merge enabled candidate: $update_type"
              ;;
            *)
              echo "auto_merge=false" >> "$GITHUB_OUTPUT"
              echo "reason=manual-review-required" >> "$GITHUB_OUTPUT"
              echo "Manual review required for update type: $update_type"
              ;;
          esac

      - name: Manual review required
        if: steps.policy.outputs.auto_merge != 'true'
        run: |
          echo "Skipping auto-merge. Reason: ${{ steps.policy.outputs.reason }}"

      - name: Enable auto-merge
        if: steps.policy.outputs.auto_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          auto_merge_enabled=$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json autoMergeRequest --jq '.autoMergeRequest != null')
          if [[ "$auto_merge_enabled" == "true" ]]; then
            echo "Auto-merge is already enabled."
            exit 0
          fi
          gh pr merge "$PR_NUMBER" --repo "$REPOSITORY" --auto --squash
