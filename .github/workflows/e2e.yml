name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL for E2E tests'
        required: false
        default: 'http://localhost:3000'
        type: string
  pull_request:
    paths:
      - 'frontend/e2e/**'
      - 'frontend/playwright.config.ts'
      - 'frontend/package.json'
      - 'frontend/app/**'
  push:
    branches:
      - main
    paths:
      - 'frontend/e2e/**'
      - 'frontend/playwright.config.ts'
      - 'frontend/package.json'
      - 'frontend/app/**'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build and start backend services
      - name: Docker Compose up
        run: |
          cd backend
          docker compose up -d --build postgres redis api
        continue-on-error: true

      - name: Wait for services
        run: sleep 20

      # Start frontend dev server in background
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Start frontend server
        run: |
          PORT=3000 node .next/standalone/frontend/server.js &
          echo "Waiting for server to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Server is ready!"
              exit 0
            fi
            echo "Attempt $i/30 - server not ready, waiting..."
            sleep 2
          done
          echo "Server failed to start within 60 seconds"
          exit 1
        working-directory: frontend

      - name: Run E2E tests (shard 1/2)
        run: npx playwright test --reporter=html,junit --shard=1/2 --retries=2 --trace=on-first-retry --project=chromium --workers=2
        working-directory: frontend
        env:
          E2E_BASE_URL: ${{ inputs.base_url || 'http://localhost:3000' }}

      - name: Run E2E tests (shard 2/2)
        run: npx playwright test --reporter=html,junit --shard=2/2 --retries=2 --trace=on-first-retry --project=chromium --workers=2
        working-directory: frontend
        env:
          E2E_BASE_URL: ${{ inputs.base_url || 'http://localhost:3000' }}

      - name: Upload E2E artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-artifacts-${{ github.run_number }}
          path: |
            frontend/playwright-report/
            frontend/playwright-traces/
          retention-days: 14

      - name: Upload JUnit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-junit-report-${{ github.run_number }}
          path: frontend/playwright-results/results.xml
          retention-days: 14

      - name: Docker Compose down
        if: always()
        run: |
          cd backend
          docker compose down -v
